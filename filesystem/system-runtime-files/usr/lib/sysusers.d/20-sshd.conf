# Privilege-separation user for sshd (built with --with-privsep-user=sshd,
# --with-privsep-path=/var/empty). Declared in vendor /usr and materialized
# into the volatile /etc at boot by systemd-sysusers.service, per the stateless
# model -- not baked into /etc/passwd. Locked account, no shell, no home.
#Type Name ID GECOS                   Home        Shell
u     sshd 22 "Privilege-separated SSH" /var/empty /usr/bin/false
