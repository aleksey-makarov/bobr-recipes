# The legacy `bin` system user (uid 1). Some units require it, e.g.
# man-db.service runs `install -o bin -g bin /var/cache/man`. The `bin` group
# already exists in /etc/group (gid 1); sysusers materializes the matching user
# into the volatile /etc at boot (per the stateless model) rather than baking it
# statically into /etc/passwd.
#Type Name ID GECOS Home
u     bin  1  -     /
