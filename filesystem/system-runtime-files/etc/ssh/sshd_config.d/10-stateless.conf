# Stateless-image SSH policy. Public-key auth only: the user places a key by
# hand in /home/user/.ssh/authorized_keys on the persistent /home disk (nothing
# is seeded by the image). Root has no persistent home, so root SSH is off;
# admin access stays on the serial console (autologin).
#
# sshd uses the first obtained value per keyword, and openssh's post_install
# prepends `Include /etc/ssh/sshd_config.d/*.conf` at the top of sshd_config,
# so these win over the shipped defaults.
PubkeyAuthentication yes
PasswordAuthentication no
KbdInteractiveAuthentication no
PermitRootLogin no
AllowUsers user
UsePAM yes
