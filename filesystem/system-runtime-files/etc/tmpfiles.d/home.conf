# Ensure the interactive user's home exists on the persistent /home (ext4 on
# /dev/vdb), created/owned by uid 1000. This must run AFTER /home is mounted,
# or it lands on the underlying dir that vdb then hides. The /home fstab entry
# is `nofail`, which drops the mount's default ordering before local-fs.target,
# so systemd-tmpfiles-setup would otherwise run first; the fstab line pins the
# order back with x-systemd.before=systemd-tmpfiles-setup.service. `d` also
# adjusts an existing dir's mode/owner, so a stale root-owned /home/user from an
# earlier boot is corrected here. Idempotent across boots.
d /home/user 0700 user user -
