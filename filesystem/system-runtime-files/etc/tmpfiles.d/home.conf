# Ensure the interactive user's home exists on the persistent /home (ext4 on
# /dev/vdb). systemd-tmpfiles-setup runs after local-fs.target, i.e. after
# /home is mounted, so this creates /home/user on the writable disk (owned by
# uid 1000). Idempotent: a no-op once the directory persists across boots.
d /home/user 0700 user user -
