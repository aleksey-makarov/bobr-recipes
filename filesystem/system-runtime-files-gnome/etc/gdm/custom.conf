# GDM configuration. Our mutter/gnome-shell are Wayland-only, so force Wayland.
# `user` has a locked password (passwordless model), so the only way in is
# automatic login -- which launches the GNOME session from
# /usr/share/wayland-sessions/gnome.desktop.
[daemon]
WaylandEnable=true
AutomaticLoginEnable=true
AutomaticLogin=user
