# GNOME Display Manager system user (gnome rootfs only). Declared in vendor /usr
# and materialized into the volatile /etc at boot by systemd-sysusers, per the
# stateless model -- not baked into /etc/passwd. The same line creates the
# matching gdm group. Home is /var/lib/gdm (created by tmpfiles, see 60-gdm.conf
# in tmpfiles.d); no interactive shell.
#Type Name ID GECOS                   Home         Shell
u     gdm  -  "GNOME Display Manager" /var/lib/gdm /usr/bin/false
