# Interactive login user. Declared here (vendor /usr) and materialized into the
# writable overlay /etc at boot by systemd-sysusers.service, per the stateless
# model (SYSTEMD_RO_ROOT_HOWTO.md) -- not baked statically into /etc/passwd.
# sysusers sets a locked password (no password login), which matches the
# passwordless autologin. The home directory is created separately by tmpfiles
# (sysusers does not create it). The ID 1000 also creates the matching group.
#Type Name ID    GECOS  Home        Shell
u     user 1000  "user" /home/user  /bin/bash
